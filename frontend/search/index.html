<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Vynex Search</title>

    <link rel="stylesheet"
          href="style.css">
</head>
<body>

<div class="search-page">

    <div class="topbar">

        <h1 class="small-logo">
            Vynex
        </h1>

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Search..."
            >

            <button id="searchBtn">
                Search
            </button>

        </div>

    </div>

    <div id="results"></div>

</div>

<script src="../app.js"></script>

</body>
</html>
